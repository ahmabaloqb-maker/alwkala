<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="description" content="مجموعة الوكالة للهواتف الذكية - تواصل معنا عبر واتساب، إنستغرام، تيك توك، فيسبوك أو اتصال مباشر">
    <meta name="theme-color" content="#0B1E38">
    <title>مجموعة الوكالة | للهواتف الذكية</title>
    <link rel="stylesheet" href="https://maxst.icons8.com/vue-static/landings/line-awesome/line-awesome/1.3.0/css/line-awesome.min.css">
    
    <!-- ملف التنسيقات الرئيسي -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="card">
        <!-- رأس الصفحة مع مكان الشعار -->
        <header class="store-header">
            <div class="logo-space">
                <img src="images/logo.png" alt="شعار مجموعة الوكالة"> 
            </div>
            <h1 class="store-name"> مجموعة الوكالة للهواتف الذكية </h1>
            <div class="store-sub">
                <i class="las la-circle"></i> 
                جــوالات - إكسسوارات - صـــيانة - بـــرمجة 
                <i class="las la-circle"></i>
            </div>
        </header>

        <!-- قسم الترحيب -->
        <section class="welcome-section">
            <div class="welcome-title">
                <i class="las la-hand-peace"></i> 
                <span>أهلاً وسهلاً بك</span> 
                <i class="las la-qrcode"></i>
            </div>
            <div class="welcome-text">
                <i class="las la-crown"></i> 
                اختر وسيلة التواصل التي تناسبك 
                <i class="las la-crown"></i>
            </div>
        </section>

        <!-- أزرار التواصل الاجتماعي -->
        <div class="buttons-grid">
            <!-- واتساب -->
            <a href="https://wa.me/967785066766?text=السلام عليكم، أريد الاستفسار عن" 
               class="social-btn whatsapp" 
               target="_blank" 
               rel="noopener noreferrer">
                <i class="lab la-whatsapp"></i>
                <h3>واتساب</h3>
                <p>خدمة العملاء</p>
            </a>

            <!-- انستغرام -->
            <a href="https://www.instagram.com/phone_awk" 
               class="social-btn instagram" 
               target="_blank" 
               rel="noopener noreferrer">
                <i class="lab la-instagram"></i>
                <h3>إنستغرام</h3>
                <p>@phone_awk</p>
            </a>

            <!-- تيك توك -->
            <a href="https://www.tiktok.com/@phone_awk" 
               class="social-btn tiktok" 
               target="_blank" 
               rel="noopener noreferrer">
                <i class="lab la-tiktok"></i>
                <h3>تيك توك</h3>
                <p>@phone_awk</p>
            </a>

            <!-- فيسبوك -->
            <a href="https://www.facebook.com/phone12344" 
               class="social-btn facebook" 
               target="_blank" 
               rel="noopener noreferrer">
                <i class="lab la-facebook-f"></i>
                <h3>فيسبوك</h3>
                <p>آخر العروض</p>
            </a>
        </div>

        <!-- اختيار الشبكة -->
        <div class="network-section">
            <div class="network-options">
                <label class="network-radio">
                    <input type="radio" name="network" value="967" checked>
                    <i class="las la-tower-cell"></i>
                    <span>يمن موبايل</span>
                </label>
                <label class="network-radio">
                    <input type="radio" name="network" value="967">
                    <i class="las la-sim-card"></i>
                    <span>سبأفون</span>
                </label>
                <label class="network-radio">
                    <input type="radio" name="network" value="967">
                    <i class="las la-wifi"></i>
                    <span>YOU</span>
                </label>
            </div>
        </div>

        <!-- زر الاتصال المباشر -->
        <a href="tel:+967785066766" 
           class="social-btn call-btn" 
           id="callButton">
            <i class="las la-phone-alt"></i>
            <h3>اتصال مباشر</h3>
            <p>نتشرف بخدمتك</p>
        </a>

        <!-- توقيع المصمم -->
        <footer class="developer-credit">
            <div class="credit-content">
                <div class="credit-icon">
                    <i class="las la-code"></i>
                </div>
                <span class="credit-text">تصميم وتطوير</span>
                <span class="credit-name">م/ أحمد بن احمد</span>
                <div class="credit-icon">
                    <i class="las la-laptop-code"></i>
                </div>
            </div>
        </footer>

        <!-- تذييل -->
        <div class="footer-note">
            <i class="las la-heart"></i> 
            <span>مجموعة الوكالة - ثقة وأمان وجودة</span> 
            <i class="las la-shield-alt"></i>
        </div>
    </main>

    <!-- ملف الجافا سكريبت الرئيسي -->
    <script src="js/main.js"></script>
</body>
</html>
